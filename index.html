<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grade 8 Champaca</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #06091a;
      --deep:   #080d28;
      --mid:    #0d1540;
      --gold:   #c9a84c;
      --gold2:  #e8c96a;
      --glow:   #f0d878;
      --pale:   #d4c5a0;
      --white:  #f5f2eb;
      --dim:    rgba(201,168,76,0.12);
    }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: var(--navy);
      font-family: 'DM Mono', monospace;
      color: var(--white);
      cursor: default;
    }

    /* ── Starfield ── */
    canvas#stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }

    /* ── Radial glow behind emblem ── */
    .core-glow {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 420px; height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, rgba(201,168,76,0.04) 50%, transparent 75%);
      z-index: 1;
      animation: pulse 4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1);   opacity: 0.8; }
      50%      { transform: translate(-50%,-50%) scale(1.1); opacity: 1;   }
    }

    /* ── Decorative rings ── */
    .ring {
      position: fixed; top: 50%; left: 50%;
      border-radius: 50%; border: 1px solid rgba(201,168,76,0.12);
      transform: translate(-50%, -50%);
      z-index: 1;
      animation: ringPulse 6s ease-in-out infinite;
    }
    .ring:nth-child(1) { width: 260px; height: 260px; border-color: rgba(201,168,76,0.22); animation-delay: 0s; }
    .ring:nth-child(2) { width: 380px; height: 380px; animation-delay: 0.5s; }
    .ring:nth-child(3) { width: 520px; height: 520px; animation-delay: 1s; border-style: dashed; }
    .ring:nth-child(4) { width: 660px; height: 660px; animation-delay: 1.5s; }
    .ring:nth-child(5) { width: 820px; height: 820px; animation-delay: 2s; border-color: rgba(201,168,76,0.06); }
    @keyframes ringPulse {
      0%,100% { opacity: 0.6; } 50% { opacity: 1; }
    }

    /* ── Orbit track ── */
    .orbit-track {
      position: fixed; top: 50%; left: 50%;
      width: 580px; height: 580px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.15);
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    /* ── Orbiting subjects ── */
    .subject {
      position: fixed;
      transform: translate(-50%, -50%);
      cursor: pointer;
      text-decoration: none;
      z-index: 3;
    }

    .subject-inner {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: transform 0.3s ease;
    }

    .subject:hover .subject-inner { transform: scale(1.15); }

    .subject-bubble {
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(6,9,26,0.85);
      border: 1.5px solid rgba(201,168,76,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 16px rgba(201,168,76,0.15), inset 0 0 8px rgba(201,168,76,0.05);
      transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
    }
    .subject:hover .subject-bubble {
      border-color: var(--gold2);
      background: rgba(201,168,76,0.12);
      box-shadow: 0 0 28px rgba(232,201,106,0.4), inset 0 0 12px rgba(201,168,76,0.1);
    }

    .subject-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--pale);
      white-space: nowrap;
      opacity: 0.7;
      transition: opacity 0.3s, color 0.3s;
    }
    .subject:hover .subject-label {
      opacity: 1; color: var(--gold2);
    }

    /* ── Center emblem ── */
    .center {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      text-align: center;
    }

    .emblem-wrap {
      width: 140px; height: 140px; border-radius: 50%;
      position: relative;
      filter: drop-shadow(0 0 24px rgba(201,168,76,0.5));
      animation: emblemFloat 5s ease-in-out infinite;
    }
    @keyframes emblemFloat {
      0%,100% { transform: translateY(0px);  }
      50%      { transform: translateY(-8px); }
    }
    .emblem-wrap img {
      width: 100%; height: 100%; border-radius: 50%; display: block;
    }

    .center-text {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .grade-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.35em;
      text-transform: uppercase; color: var(--gold);
      opacity: 0.8;
    }
    .section-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: 2.4rem;
      letter-spacing: 0.08em;
      color: var(--white);
      line-height: 1;
    }
    .section-name em {
      font-style: italic; color: var(--gold2);
    }
    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 8px; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--pale);
      opacity: 0.45; margin-top: 2px;
    }

    /* ── Corner ornaments ── */
    .ornament {
      position: fixed; z-index: 2;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; letter-spacing: 0.2em;
      color: rgba(201,168,76,0.3); text-transform: uppercase;
    }
    .orn-tl { top: 28px; left: 32px; }
    .orn-tr { top: 28px; right: 32px; text-align: right; }
    .orn-bl { bottom: 28px; left: 32px; }
    .orn-br { bottom: 28px; right: 32px; text-align: right; }

    .orn-line {
      display: block; width: 40px; height: 1px;
      background: rgba(201,168,76,0.25); margin-top: 4px;
    }
    .orn-tr .orn-line, .orn-br .orn-line { margin-left: auto; }

    /* ── Hover tooltip ── */
    .tooltip {
      position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); opacity: 0;
      z-index: 20;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .tooltip.show { opacity: 0.7; }

    /* ── Fade in on load ── */
    body { animation: fadeIn 1.2s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .mobile-subjects { display: none; }

    @media (max-width: 600px) {
      .emblem-wrap { width: 90px; height: 90px; }
      .section-name { font-size: 1.6rem; }
      .grade-label { font-size: 7px; }
      .tagline { font-size: 6px; }
      .subject-bubble { width: 38px; height: 38px; font-size: 16px; }
      .subject-label { font-size: 7px; letter-spacing: 0.1em; }
      .ring:nth-child(3), .ring:nth-child(4), .ring:nth-child(5) { display: none; }
      .ornament { display: none; }
    }
  </style>
</head>

<script>
  // ── Starfield ──────────────────────────────────────────────────────────────
  const canvas = document.getElementById('stars');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.004 + 0.002,
        phase: Math.random() * Math.PI * 2
      });
    }
  }
  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.5 * Math.sin(s.phase + t * s.speed);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(212,197,160,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  resize();
  initStars();
  requestAnimationFrame(drawStars);
  window.addEventListener('resize', () => { resize(); initStars(); });

  // ── Subjects ───────────────────────────────────────────────────────────────
  const subjects = [
    { name: 'Chemistry',    emoji: '⚗️',  href: 'chemistry.html' },
    { name: 'Physics',      emoji: '🔭',  href: 'physics.html' },
    { name: 'Biology',      emoji: '🧬',  href: 'biology.html' },
    { name: 'Earth Science',emoji: '🌍',  href: 'earthscience.html' },
    { name: 'Algebra',      emoji: '📐',  href: 'algebra.html' },
    { name: 'Geometry',     emoji: '📏',  href: 'geometry.html' },
    { name: 'Social Science',emoji:'🏛️', href: 'socsci.html' },
    { name: 'Filipino',     emoji: '📖',  href: 'filipino.html' },
    { name: 'English',      emoji: '✒️',  href: 'english.hrml' },
  ];

  const system = document.getElementById('orbitSystem');
  const tooltip= document.getElementById('tooltip');
  let tipTimer;

  function getR() {
    return Math.min(290, Math.min(window.innerWidth, window.innerHeight) * 0.32);
  }

  // Build subject elements
  const subjectEls = subjects.map((s, i) => {
    const el = document.createElement('a');
    el.className = 'subject';
    el.href = s.href;

    el.innerHTML = `
      <div class="subject-inner">
        <div class="subject-bubble">${s.emoji}</div>
        <span class="subject-label">${s.name}</span>
      </div>`;

    el.addEventListener('mouseenter', () => {
      tooltip.textContent = s.href === '#' ? s.name + ' — coming soon' : 'Open ' + s.name;
      tooltip.classList.add('show');
      clearTimeout(tipTimer);
    });
    el.addEventListener('mouseleave', () => {
      tipTimer = setTimeout(() => tooltip.classList.remove('show'), 600);
    });

    if (s.href === '#') {
      el.addEventListener('click', e => e.preventDefault());
      el.style.opacity = '0.6';
    }

    system.appendChild(el);
    return el;
  });

  // JS-driven orbit
  const PERIOD = 40000; // ms for one full revolution
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;

  let centerX = window.innerWidth / 2;
  let centerY = window.innerHeight / 2;

  window.addEventListener('resize', () => {
    centerX = window.innerWidth / 2;
    centerY = window.innerHeight / 2;
  });

  function animateOrbit(ts) {
    const angle0 = (ts / PERIOD) * 2 * Math.PI;
    const R = getR();
    subjectEls.forEach((el, i) => {
      const angle = angle0 + (i / subjects.length) * 2 * Math.PI - Math.PI / 2;
      const x = centerX + R * Math.cos(angle);
      const y = centerY + R * Math.sin(angle);
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
    });
    requestAnimationFrame(animateOrbit);
  }
  requestAnimationFrame(animateOrbit);

  // Mobile fallback
  const mob = document.getElementById('mobileSubjects');
  subjects.forEach(s => {
    const el = document.createElement('a');
    el.className = 'mobile-subject';
    el.href = s.href;
    el.innerHTML = `
      <div class="mobile-subject-bubble">${s.emoji}</div>
      <span class="mobile-subject-label">${s.name}</span>`;
    if (s.href === '#') el.addEventListener('click', e => e.preventDefault());
    mob.appendChild(el);
  });
</script>
</body>
</html>
